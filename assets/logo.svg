<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#030305"/>

  <!-- Audio waveform bars -->
  <g transform="translate(256, 180)">
    <rect x="-60" y="-24" width="8" height="48" rx="4" fill="url(#grad)" opacity="0.7"/>
    <rect x="-40" y="-40" width="8" height="80" rx="4" fill="url(#grad)" opacity="0.85"/>
    <rect x="-20" y="-16" width="8" height="32" rx="4" fill="url(#grad)" opacity="0.6"/>
    <rect x="0" y="-52" width="8" height="104" rx="4" fill="url(#grad)"/>
    <rect x="20" y="-32" width="8" height="64" rx="4" fill="url(#grad)" opacity="0.8"/>
    <rect x="40" y="-44" width="8" height="88" rx="4" fill="url(#grad)" opacity="0.9"/>
    <rect x="60" y="-20" width="8" height="40" rx="4" fill="url(#grad)" opacity="0.65"/>
  </g>

  <!-- Text: cotify -->
  <text x="256" y="320" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-2" fill="#ffffff">cotify</text>

  <!-- Subtitle dot -->
  <text x="256" y="365" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="4" fill="url(#grad)" opacity="0.6">.space</text>
</svg>
